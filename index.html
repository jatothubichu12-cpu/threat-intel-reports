
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { padding: 1.5rem 0; }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin-top: 4px; }
  .config-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-tertiary); }
  .config-card h3 { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1rem; }
  .field label { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); }
  .field input, .field textarea, .field select { width: 100%; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: var(--color-background-primary); color: var(--color-text-primary); padding: 8px 10px; font-size: 14px; font-family: var(--font-sans); resize: vertical; }
  .field textarea { min-height: 80px; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--color-border-primary); }
  .section-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 1.5rem 0 0.75rem; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .btn-upload { width: 100%; padding: 12px; border-radius: var(--border-radius-md); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); font-size: 15px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 1.5rem; }
  .btn-upload:hover { background: var(--color-background-secondary); }
  .btn-upload:active { transform: scale(0.98); }
  .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { margin-top: 1rem; padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 13px; display: none; }
  .status.success { background: var(--color-background-success); color: var(--color-text-success); border: 0.5px solid var(--color-border-success); display: block; }
  .status.error { background: var(--color-background-danger); color: var(--color-text-danger); border: 0.5px solid var(--color-border-danger); display: block; }
  .status.loading { background: var(--color-background-info); color: var(--color-text-info); border: 0.5px solid var(--color-border-info); display: block; }
  .token-note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
  .preview-btn { font-size: 12px; color: var(--color-text-info); background: none; border: none; cursor: pointer; padding: 0; margin-top: 4px; }
  .preview-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); padding: 12px; font-size: 12px; font-family: var(--font-mono); color: var(--color-text-secondary); white-space: pre-wrap; margin-top: 8px; display: none; max-height: 200px; overflow-y: auto; }
</style>

<div class="wrap">
  <div class="header">
    <h2><i class="ti ti-shield" aria-hidden="true" style="font-size:18px; margin-right:6px; vertical-align:-2px;"></i>TIR report uploader</h2>
    <p>Fill your report below and it will auto-upload to your GitHub repo</p>
  </div>

  <div class="config-card">
    <h3>GitHub settings — fill these first</h3>
    <div class="config-row">
      <div class="field" style="margin-bottom:0">
        <label>Username</label>
        <input type="text" id="gh-user" value="jatothubichu12-cpu" />
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Repository name</label>
        <input type="text" id="gh-repo" value="threat-intel-reports" />
      </div>
    </div>
    <div class="field" style="margin-top:10px; margin-bottom:0;">
      <label>Personal access token — paste your token here</label>
      <input type="password" id="gh-token" placeholder="ghp_paste your token here..." />
      <span class="token-note">Your token stays only in your browser — never shared anywhere except GitHub API</span>
    </div>
  </div>

  <div class="section-title">Report fields</div>

  <div class="field">
    <label>Title</label>
    <input type="text" id="f-title" placeholder="e.g. LockBit 3.0 Ransomware Campaign – June 2026" />
  </div>

  <div class="field">
    <label>Category</label>
    <select id="f-category">
      <option value="">Select category...</option>
      <option>Ransomware</option>
      <option>Phishing / Spear Phishing</option>
      <option>Malware – Trojan</option>
      <option>Malware – Worm</option>
      <option>Malware – Spyware</option>
      <option>Malware – Rootkit</option>
      <option>Malware – Keylogger</option>
      <option>Malware – Fileless</option>
      <option>Botnet / RAT</option>
      <option>DDoS</option>
      <option>SQL Injection</option>
      <option>XSS</option>
      <option>Zero-Day Exploit</option>
      <option>CVE / Known Vulnerability</option>
      <option>APT</option>
      <option>Supply Chain Attack</option>
      <option>Data Breach</option>
      <option>Insider Threat</option>
      <option>Credential Theft</option>
      <option>Social Engineering</option>
      <option>Other</option>
    </select>
  </div>

  <div class="field">
    <label>Description</label>
    <textarea id="f-desc" placeholder="What is this threat? Give a clear overview..."></textarea>
  </div>

  <div class="field">
    <label>How it works</label>
    <textarea id="f-how" placeholder="Step-by-step technical explanation of how the attack operates..." style="min-height:100px;"></textarea>
  </div>

  <div class="field">
    <label>Impact</label>
    <textarea id="f-impact" placeholder="What damage can it cause? (data loss, financial loss, downtime...)"></textarea>
  </div>

  <div class="field">
    <label>IOCs (Indicators of Compromise)</label>
    <textarea id="f-iocs" placeholder="List IOCs here — one per line&#10;e.g. IP: 192.168.1.100&#10;Domain: malicious-site.com&#10;Hash: a1b2c3...&#10;File: malware.exe"></textarea>
  </div>

  <div class="field">
    <label>Remediation / Mitigation</label>
    <textarea id="f-remed" placeholder="How to stop it, recover from it, and prevent it in future..."></textarea>
  </div>

  <div class="field">
    <label>Sources / References</label>
    <textarea id="f-sources" placeholder="Paste article links here — one per line&#10;e.g. https://bleepingcomputer.com/..." style="min-height:60px;"></textarea>
  </div>

  <button class="preview-btn" onclick="togglePreview()"><i class="ti ti-eye" aria-hidden="true"></i> Preview markdown before uploading</button>
  <div class="preview-box" id="preview-box"></div>

  <button class="btn-upload" id="upload-btn" onclick="uploadReport()">
    <i class="ti ti-upload" aria-hidden="true"></i> Upload to GitHub ↗
  </button>

  <div class="status" id="status-box"></div>
</div>

<script>
function getVal(id) { return document.getElementById(id).value.trim(); }

function buildMarkdown() {
  const title = getVal('f-title');
  const cat = getVal('f-category');
  const desc = getVal('f-desc');
  const how = getVal('f-how');
  const impact = getVal('f-impact');
  const iocs = getVal('f-iocs');
  const remed = getVal('f-remed');
  const sources = getVal('f-sources');
  const now = new Date();
  const dateStr = now.toISOString().split('T')[0];
  const iocLines = iocs ? iocs.split('\n').filter(l => l.trim()).map(l => '- ' + l.trim()).join('\n') : '- None listed';
  const sourceLines = sources ? sources.split('\n').filter(l => l.trim()).map(l => '- ' + l.trim()).join('\n') : '';
  return `# ${title}\n\n**Date:** ${dateStr}  \n**Category:** ${cat}  \n**Author:** Jatothu Bichu (jatothubichu12-cpu)\n\n---\n\n## Description\n${desc}\n\n---\n\n## How it works\n${how}\n\n---\n\n## Impact\n${impact}\n\n---\n\n## IOCs (Indicators of Compromise)\n${iocLines}\n\n---\n\n## Remediation / Mitigation\n${remed}\n\n---\n${sourceLines ? `\n## Sources\n${sourceLines}\n\n---\n` : ''}\n*Report generated: ${now.toUTCString()}*\n`;
}

function buildFileName() {
  const title = getVal('f-title');
  const date = new Date().toISOString().split('T')[0];
  const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').substring(0, 50);
  return `reports/${date}-${slug || 'tir-report'}.md`;
}

function togglePreview() {
  const box = document.getElementById('preview-box');
  if (box.style.display === 'block') { box.style.display = 'none'; }
  else { box.textContent = buildMarkdown(); box.style.display = 'block'; }
}

function setStatus(msg, type) {
  const el = document.getElementById('status-box');
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

async function uploadReport() {
  const user = getVal('gh-user');
  const repo = getVal('gh-repo');
  const token = getVal('gh-token');
  const title = getVal('f-title');

  if (!token) { setStatus('❌ Please paste your GitHub token in the token field above.', 'error'); return; }
  if (!repo) { setStatus('❌ Please enter your repository name.', 'error'); return; }
  if (!title) { setStatus('❌ Please add a report title.', 'error'); return; }

  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  setStatus('⏳ Uploading to GitHub...', 'loading');

  const content = buildMarkdown();
  const fileName = buildFileName();
  const encoded = btoa(unescape(encodeURIComponent(content)));

  try {
    const checkRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${fileName}`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    let sha = undefined;
    if (checkRes.ok) { const existing = await checkRes.json(); sha = existing.sha; }

    const body = { message: `Add TIR report: ${title}`, content: encoded };
    if (sha) body.sha = sha;

    const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${fileName}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      const data = await res.json();
      const fileUrl = data.content.html_url;
      setStatus(`✅ Uploaded successfully! <a href="${fileUrl}" target="_blank" style="color:inherit; text-decoration:underline;">Click here to view on GitHub</a>`, 'success');
    } else {
      const err = await res.json();
      setStatus('❌ Upload failed: ' + (err.message || 'Check your token and repo name.'), 'error');
    }
  } catch(e) {
    setStatus('❌ Error: ' + e.message, 'error');
  }
  btn.disabled = false;
}
</script>
